<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FAFAF7" />
    <title>VPPS Fee Admin is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #fbfaf6;
        color: #151923;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid #e3ded3;
        border-radius: 12px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 8px 28px rgb(21 25 35 / 8%);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.2;
      }

      p {
        margin: 14px 0 0;
        color: #5f6470;
        line-height: 1.6;
      }

      strong {
        color: #151923;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reconnect to continue fee work</h1>
      <p>
        Payments and receipts need the school server. Reconnect, then open the page again before
        collecting fees or printing receipts.
      </p>
      <p><strong>Offline mode is read-only.</strong> No payment is saved from this screen.</p>
    </main>
  </body>
</html>
